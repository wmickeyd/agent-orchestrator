apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  labels:
    app: agent-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
    spec:
      containers:
      - name: agent-orchestrator
        image: wmcdonald/agent-orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi" # Agents need a bit more RAM for parsing docs
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 30
        env:
        - name: DATABASE_URL
          value: "sqlite:///./agent_orchestrator.db" # Can be switched to Postgres in prod
        - name: OLLAMA_URL
          value: "http://ollama-service.ai-services.svc.cluster.local:11434/api/generate"
        - name: OLLAMA_MODEL
          value: "qwen3.5:4b"
        - name: SCRAPER_BASE_URL
          value: "http://dev-webscraper.webscraper-dev.svc.cluster.local"
        - name: UTILITY_BASE_URL
          value: "http://dev-utility-api.utility-dev.svc.cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  labels:
    app: agent-orchestrator
spec:
  ports:
  - port: 8002
    targetPort: 8002
    name: http
  selector:
    app: agent-orchestrator
  type: ClusterIP
